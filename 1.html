<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب جديد - واتساب</title>

    <style>
        :root {
            --primary-color: #25D366;
            --secondary-color: #f8fafc;
            --text-dark: #1e293b;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #e0f7ef, #f1f5f9);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .order-card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--text-dark);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: var(--border-radius);
            border: 2px solid #e2e8f0;
            background: var(--secondary-color);
            font-size: 1rem;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<div class="order-card">
    <h2>📦 اطلب الآن</h2>

    <form id="contact-form">

        <div class="form-group">
            <label>الاسم</label>
            <input type="text" name="user_name" required>
        </div>

        <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="tel" name="user_phone" required>
        </div>





        <div class="form-group">
            <label>تفاصيل إضافية</label>
            <textarea name="message"></textarea>
        </div>

        <button type="submit">اطلب عبر واتساب</button>
    </form>
</div>

<script>
document.getElementById('contact-form').addEventListener('submit', function(event) {
    event.preventDefault();

    const name = document.querySelector('[name="user_name"]').value;
    const phone = document.querySelector('[name="user_phone"]').value;
   
    const details = document.querySelector('[name="message"]').value;

    const message = `📦 * طلب جديد مانجا بوروتو الفصل 63*

    المنتج: مانجا بوروتو فصل63

👤 الاسم: ${name}
📞 رقم الهاتف: ${phone}

📝 التفاصيل:
${details}`;

    const whatsappURL = `https://wa.me/971509900260?text=${encodeURIComponent(message)}`;

    window.open(whatsappURL, '_blank');
});
</script>

</body>
</html>
