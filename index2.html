
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-pulse | Anime Store</title>

<link rel="icon" href="brand-logo.jpeg">

<style>
:root {
    --primary: #8a2be2;
    --secondary: #00f7ff;
    --pink: #ff4ecd;
    --black: #0d0d0d;
    --white: #ffffff;
    --transition: 0.3s;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--white);
    overflow-x: hidden;
}

/* نافذة التنبيه */
.popup {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

.popup-box {
    background: #111;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 0 20px #8a2be2;
}

.popup-box h3 {
    margin-bottom: 15px;
}

.popup-box button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #00f7ff;
    color: black;
    border-radius: 10px;
    cursor: pointer;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%;
    position: fixed;
    width: 100%;
    z-index: 1000;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.logo {
    color: var(--pink);
    font-weight: bold;
    font-size: 22px;
}

nav a {
    margin: 0 8px;
    color: var(--white);
    text-decoration: none;
    font-size: 14px;
    transition: var(--transition);
}

nav a:hover {
    color: var(--secondary);
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
    url('https://i.postimg.cc/QNKD3BLR/OIP.webp');

    background-size: cover;
    background-position: center;
}

.hero h1 {
    font-size: 40px;
    text-shadow: 0 0 20px #8a2be2, 0 0 40px #ff4ecd;
}

.hero p {
    color: var(--secondary);
    margin-top: 10px;
    font-size: 14px;
}

/* 🛒 CART */
.cart {
    position: fixed;
    top: 80px;
    left: 10px;
    background: #111;
    padding: 10px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
    font-size: 12px;
}

#cart-items {
    margin-top: 8px;
}

/* PRODUCTS */
.products {
    padding: 60px 15px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
    background: #0b0b0b;
}

.product-card {
    background: #111;
    border-radius: 15px;
    overflow: hidden;
    transition: var(--transition);
    box-shadow: 0 0 15px rgba(0,255,255,0.1);
}

.product-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 0 25px var(--primary);
}

.product-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.product-info {
    padding: 12px;
    text-align: center;
}

.product-info h3 {
    margin-bottom: 10px;
    font-size: 14px;
}

.btn {
    display: inline-block;
    padding: 8px 18px;
    border: 1px solid var(--secondary);
    color: var(--secondary);
    text-decoration: none;
    font-size: 14px;
    transition: var(--transition);
    cursor: pointer;
}

.btn:hover {
    background: var(--secondary);
    color: black;
}
</style>
</head>

<body>



<header>
    <div class="logo">N-pulse</div>
    <nav>
        <a href="index.html">الصفحة الرئيسية</a>
        <a href="index2.html">افلام</a>
        <a href="index3.html">انمي</a>
        <a href="t.html">تواصل</a>
    </nav>
</header>

<div class="cart">
    🛒 السلة: <span id="cart-count">0</span>
    <div id="cart-items"></div>
</div>

<section class="hero">
    <div>
        <h1>عالم الافلام</h1>
        <p>أقوى المنتجات لمحبي الافلام 🔥</p>
    </div>
</section>

<section class="products">

    <div class="product-card">
        <img src="121.jpeg">
        <div class="product-info">
            <h3>عصا هيرميون جرينجر</h3>
            <p>السعر:300درهم</p>
            <button class="btn" onclick="addToCart('عصا هيرميون',300)">أضف للسلة</button><br><br>
            <a href="hermon.html" class="btn">شراء</a>
        </div>
    </div>

    <div class="product-card">
        <img src="212.jpeg">
        <div class="product-info">
            <h3>عصا لونا لوفجود</h3>
            <p>السعر:350درهم</p>
            <button class="btn" onclick="addToCart('عصا لونا',350)">أضف للسلة</button><br><br>
            <a href="lona.html" class="btn">شراء</a>
        </div>
    </div>


</section>

<script>
// إغلاق الرسالة
function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// السلة
let cart = [];

function addToCart(name, price) {
    cart.push({name, price});
    updateCart();
}

function updateCart() {
    let count = document.getElementById("cart-count");
    let items = document.getElementById("cart-items");

    count.innerText = cart.length;
    items.innerHTML = "";

    let total = 0;

    cart.forEach(item => {
        let div = document.createElement("div");
        div.innerText = item.name + " - درهم" + item.price;
        items.appendChild(div);
        total += item.price;
    });

    let totalDiv = document.createElement("div");
    totalDiv.innerHTML = "<hr>المجموع: درهم" + total;
    items.appendChild(totalDiv);
}
</script>

</body>
</html>
