<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-pulse | Store</title>

<style>
:root {
    --primary: #8a2be2;
    --secondary: #00f7ff;
    --pink: #ff4ecd;
    --black: #0d0d0d;
    --white: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--white);
}

/* 🔔 POPUP */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    backdrop-filter: blur(6px);
}

.popup-box {
    background: linear-gradient(145deg, #111, #1a1a1a);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 0 30px #8a2be2;
    animation: pop 0.4s ease;
}

@keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.popup-box h3 {
    margin-bottom: 15px;
}

.popup-box button {
    margin-top: 15px;
    padding: 10px 25px;
    border: none;
    background: linear-gradient(45deg, #00f7ff, #8a2be2);
    color: black;
    border-radius: 25px;
    cursor: pointer;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 6%;
    position: fixed;
    width: 100%;
    z-index: 1000;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
}

.logo {
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(45deg, #ff4ecd, #00f7ff);
    -webkit-background-clip: text;
    color: transparent;
}

nav a {
    margin: 0 10px;
    color: white;
    text-decoration: none;
    font-size: 14px;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    bottom: -5px;
    right: 0;
    width: 0%;
    height: 2px;
    background: var(--secondary);
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;

    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://i.postimg.cc/q72Kgdgd/wp6399419.png');

    background-size: cover;
    background-position: center;
}

.hero h1 {
    font-size: 45px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px #8a2be2, 0 0 40px #ff4ecd;
}

.hero p {
    color: var(--secondary);
    margin-bottom: 20px;
}

/* BUTTON */
.btn {
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #8a2be2, #00f7ff);
    color: black;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00f7ff;
}

/* PRODUCTS */
.products {
    padding: 60px 20px;
    background: #0b0b0b;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap: 20px;
}

.product-card {
    background: #111;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 20px var(--primary);
}

.product-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.product-info {
    padding: 15px;
    text-align: center;
}

.product-info h3 {
    margin-bottom: 10px;
    font-size: 14px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: black;
    color: #aaa;
}
</style>
</head>

<body>

<!-- 🔔 POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>⚠️ تنبيه</h3>
        <p>المتجر متوفر داخل الإمارات فقط 🇦🇪</p>
        <button onclick="closePopup()">موافق</button>
    </div>
</div>

<header>
    <div class="logo">N-pulse</div>
    <nav>
        <a href="index.html">أنمي</a>
        <a href="index2.html">أفلام</a>
        <a href="t.html">تواصل</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h1>متجر الأنمي والأفلام 🔥</h1>
        <p>أفضل المنتجات لعشاق الأنمي والأفلام</p>
       <a href="index3.html"> <button class="btn">تسوق الآن</button></a>
    </div>
</section>

<section class="products">
    <!-- تضيف منتجاتك هنا -->
</section>

<footer>
    © 2026 N-pulse Store
</footer>

<script>
function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
