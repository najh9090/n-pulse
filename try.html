<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Coach AI - N-PULSE Studio</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #f8fafc;
        }
        .chat-container { 
            width: 95%; 
            max-width: 500px; 
            background: #1e293b; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #334155;
        }
        .header { 
            background: #3b82f6; 
            padding: 20px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        #chat-box { 
            height: 450px; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scroll-behavior: smooth;
        }
        .message { 
            padding: 12px 16px; 
            border-radius: 15px; 
            font-size: 14.5px; 
            line-height: 1.5; 
            max-width: 85%; 
        }
        .user-msg { 
            background: #3b82f6; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
        }
        .ai-msg { 
            background: #334155; 
            color: #f1f5f9; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px;
            border-left: 4px solid #3b82f6;
        }
        .input-area { 
            display: flex; 
            padding: 20px; 
            background: #1e293b; 
            border-top: 1px solid #334155;
        }
        input { 
            flex: 1; 
            padding: 12px 18px; 
            border: 1px solid #334155; 
            border-radius: 30px; 
            outline: none; 
            background: #0f172a; 
            color: white;
            font-size: 14px;
        }
        button { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 0 20px; 
            margin-left: 10px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #2563eb; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">ENGLISH COACH AI</div>
    <div id="chat-box">
        <div class="message ai-msg">Hello! I'm your English coach. Type anything in English, and I will correct your mistakes and chat with you.</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // تم وضع المفتاح الخاص بك هنا
    const API_KEY = 'AIzaSyC5SPu7bjkDNkfpbM_mlHtBCfCr6TiObTA'; 

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const message = inputField.value.trim();

        if (!message) return;

        // إضافة رسالة المستخدم للواجهة
        chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
        inputField.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `System Instruction: You are an expert English language coach. 
                        Role: 
                        1. If the user makes any grammatical or spelling mistakes, point them out clearly under a "Correction:" section.
                        2. Explain why it was a mistake briefly.
                        3. Provide a more natural or "native" way to say the same thing.
                        4. Continue the conversation in English to encourage the user to keep talking.
                        5. Keep the tone encouraging and helpful.

                        User message: "${message}"` }]
                    }]
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;

            // إضافة رد الذكاء الاصطناعي للواجهة
            chatBox.innerHTML += `<div class="message ai-msg">${formatAIResponse(aiResponse)}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            chatBox.innerHTML += `<div class="message ai-msg" style="color:#ef4444;">Error: Could not connect to Gemini. Check your connection or API Key.</div>`;
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    // وظيفة بسيطة لتحسين شكل النص (تحويل الأسطر الجديدة لـ <br>)
    function formatAIResponse(text) {
        return text.replace(/\n/g, '<br>');
    }
</script>

</body>
</html>
