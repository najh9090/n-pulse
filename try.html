<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-PULSE AI - Official SDK</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-wrapper { width: 90%; max-width: 600px; background: #1e293b; border-radius: 15px; display: flex; flex-direction: column; height: 80vh; border: 1px solid #334155; }
        #chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6; max-width: 85%; }
        .user-msg { background: #3b82f6; align-self: flex-start; }
        .ai-msg { background: #334155; border: 1px solid #475569; align-self: flex-end; }
        .input-bar { padding: 20px; background: #0f172a; display: flex; gap: 10px; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; }
        input { flex: 1; background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #10b981; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #334155; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div id="chat-content">
        <div class="msg ai-msg">أهلاً بك! أنا مدعوم بمكتبة Gemini الرسمية. كيف أساعدك في متجر N-PULSE؟</div>
    </div>
    <div class="input-bar">
        <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
        <button id="send-btn">إرسال</button>
    </div>
</div>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // 1. إعداد المفتاح والموديل باستخدام المكتبة
    const API_KEY = "AIzaSyApZ_DQZQA2KbZ46SB6ZCz7r2DgmAqJeF4";
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    const chatContent = document.getElementById('chat-content');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMsg(text, isUser) {
        const div = document.createElement('div');
        div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
        div.innerText = text;
        chatContent.appendChild(div);
        chatContent.scrollTop = chatContent.scrollHeight;
    }

    async function handleChat() {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        appendMsg(prompt, true);
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            // 2. استخدام دالة المكتبة الرسمية لتوليد المحتوى
            const result = await model.generateContent(prompt);
            const response = await result.response;
            const text = response.text();
            
            appendMsg(text, false);
        } catch (error) {
            console.error("Error:", error);
            appendMsg("حدث خطأ في الاتصال بالمكتبة الرسمية.", false);
        } finally {
            sendBtn.disabled = false;
        }
    }

    sendBtn.onclick = handleChat;
    userInput.onkeydown = (e) => { if(e.key === 'Enter') handleChat(); };
</script>

</body>
</html>
