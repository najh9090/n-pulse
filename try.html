<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> try ai | N-PULSE </title>
    <style>
        :root { --main: #ff6600; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { padding: 20px; background: var(--card); border-bottom: 2px solid var(--main); text-align: center; font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }
        header span { color: var(--main); }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 20px; border-radius: 20px; max-width: 75%; font-size: 1rem; line-height: 1.6; }
        .user { background: var(--main); align-self: flex-start; border-bottom-right-radius: 5px; box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3); }
        .ai { background: #2c2c2c; align-self: flex-end; border-bottom-left-radius: 5px; }

        .input-group { padding: 20px; background: var(--card); display: flex; align-items: center; gap: 12px; }
        input { flex: 1; background: #252525; border: 1px solid #444; padding: 15px; border-radius: 30px; color: white; outline: none; }
        input:focus { border-color: var(--main); }
        button { background: var(--main); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; cursor: not-allowed; }

        .typing { font-style: italic; color: #888; font-size: 0.9rem; margin-bottom: 10px; display: none; padding: 0 20px; }
    </style>
</head>
<body>

<header>try<span>AI</span></header>

<div id="chat-box">
    <div class="msg ai">كيف يمكنني مساعدتك اليوم؟</div>
</div>

<div id="loading" class="typing">النينجا يفكر...</div>

<div class="input-group">
    <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key === 'Enter') startChat()">
    <button id="sendBtn" onclick="startChat()">إرسال</button>
</div>

<script>
    async function startChat() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chat-box');
        const load = document.getElementById('loading');
        const btn = document.getElementById('sendBtn');
        const text = input.value.trim();

        if (!text) return;

        // إضافة رسالة المستخدم
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        load.style.display = 'block';
        btn.disabled = true;

        try {
            // استبدل الرابط أدناه برابط ngrok الفعال عندك في الـ CMD
            const response = await fetch("https://unsightly-bladder-richly.ngrok-free.dev/api/generate", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "ngrok-skip-browser-warning": "true" 
                },
                body: JSON.stringify({
                    model: "phi3", 
                    prompt: text,
                    stream: false
                })
            });

            if (!response.ok) throw new Error('فشل الاتصال');

            const data = await response.json();
            load.style.display = 'none';
            
            // عرض رد الذكاء الاصطناعي
            const aiReply = data.response || "لم أستطع معالجة الطلب.";
            box.innerHTML += `<div class="msg ai">${aiReply}</div>`;

        } catch (error) {
            load.style.display = 'none';
            box.innerHTML += `<div class="msg ai" style="color: #ff4444;">خطأ: تأكد من تشغيل Ollama و ngrok واضغط Visit Site في رابط الـ ngrok أولاً.</div>`;
            console.error(error);
        }

        btn.disabled = false;
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
