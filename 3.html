<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب جديد - واتساب</title>
<style>
:root {
    --primary-color: #25D366;
    --secondary-color: #f8fafc;
    --text-dark: #1e293b;
    --border-radius: 12px;
}
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #e0f7ef, #f1f5f9);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.order-card {
    background: white;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 15px 25px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 420px;
    position: relative;
}
h2 {text-align:center;margin-bottom:25px;color:var(--text-dark);}
.form-group {margin-bottom:18px;}
label {font-weight:600;margin-bottom:6px;display:block;}
input, textarea {
    width:100%;padding:12px;border-radius:var(--border-radius);
    border:2px solid #e2e8f0;background:var(--secondary-color);
    font-size:1rem;
}
textarea {min-height:80px;resize:vertical;}
button {
    width:100%;padding:14px;background:var(--primary-color);
    color:white;border:none;border-radius:var(--border-radius);
    font-size:1.1rem;font-weight:bold;cursor:pointer;margin-top:10px;
    transition:0.3s;
}
button:hover {opacity:0.9;transform:translateY(-2px);}
.location-btn {background:#0ea5e9;}
.status {text-align:center;margin-top:10px;font-size:0.9rem;color:#64748b;}
#locationPrompt {
    background:#fef3c7;color:#92400e;padding:12px;border-radius:8px;
    margin-bottom:15px;text-align:center;font-weight:bold;display:none;
}
#locationPrompt button {
    width: auto;
    margin: 5px;
    padding: 8px 14px;
    border-radius: 8px;
}
</style>
</head>
<body>

<div class="order-card">
<h2>📦 اطلب الآن</h2>

<div id="locationPrompt">
    🔔 هل تسمح بالوصول لموقعك؟<br>
    <button onclick="confirmLocation(true)">نعم</button>
    <button onclick="confirmLocation(false)">لا</button>
</div>

<form id="contact-form">
    <div class="form-group">
        <label>الاسم</label>
        <input type="text" name="user_name" required>
    </div>
    <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="tel" name="user_phone" required>
    </div>
    <div class="form-group">
        <label>تفاصيل موقعك</label>
        <textarea name="message" placeholder="الإمارة - المنطقة - الشارع..."></textarea>
    </div>

    <button type="button" class="location-btn" onclick="showPrompt()">📍 تحديد موقعي</button>
    <div class="status" id="status"></div>
    <button type="submit">اطلب عبر واتساب</button>
</form>
</div>

<script>
let userLocation = "";

function showPrompt() {
    document.getElementById("locationPrompt").style.display = "block";
}

function confirmLocation(answer) {
    const prompt = document.getElementById("locationPrompt");
    const status = document.getElementById("status");
    prompt.style.display = "none";

    if(answer) {
        status.innerText = "⏳ جاري طلب إذن الموقع...";
        if (!navigator.geolocation) {
            status.innerText = "❌ المتصفح لا يدعم تحديد الموقع";
            return;
        }
        if(location.protocol !== "https:" && location.hostname !== "localhost") {
            status.innerText = "❌ يجب استخدام HTTPS لتحديد الموقع";
            return;
        }
        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                userLocation = `https://www.google.com/maps?q=${lat},${lon}`;
                const textarea = document.querySelector('[name="message"]');
                textarea.value += `\n📍 موقعي:\n${userLocation}\n`;
                status.innerText = "✅ تم تحديد موقعك بنجاح";
            },
            function(error) {
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        status.innerText = "❌ تم رفض الإذن من المتصفح";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        status.innerText = "❌ الموقع غير متوفر (شغل GPS)";
                        break;
                    case error.TIMEOUT:
                        status.innerText = "⏳ انتهى وقت تحديد الموقع";
                        break;
                    default:
                        status.innerText = "❌ خطأ غير معروف";
                }
            },
            {enableHighAccuracy:true, timeout:15000, maximumAge:0}
        );
    } else {
        status.innerText = "ℹ️ لم يتم تحديد الموقع";
    }
}

document.getElementById('contact-form').addEventListener('submit', function(event){
    event.preventDefault();
    const name = document.querySelector('[name="user_name"]').value;
    const phone = document.querySelector('[name="user_phone"]').value;
    const details = document.querySelector('[name="message"]').value;

    const message = `📦 *مجسم العملاق ايرن 15سم*

👤 الاسم: ${name}
📞 رقم الهاتف: ${phone}

📝 التفاصيل:
${details}

📍 الموقع:
${userLocation || "لم يتم تحديد الموقع"}`;

    const whatsappURL = `https://wa.me/971509900260?text=${encodeURIComponent(message)}`;
    window.open(whatsappURL, '_blank');
});
</script>

</body>
</html>
