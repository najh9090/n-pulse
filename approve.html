<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-PULSE | مراجعة الإعلان</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Tajawal',sans-serif; background:#0D0D0D; color:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:#161616; border:1px solid rgba(255,107,0,0.25); border-radius:24px; padding:48px 36px; max-width:460px; width:100%; text-align:center; }
  .logo { font-size:30px; font-weight:900; color:#FF6B00; margin-bottom:6px; }
  .subtitle { color:#555; font-size:13px; margin-bottom:36px; }
  .spinner { width:48px; height:48px; border:3px solid rgba(255,107,0,0.15); border-top-color:#FF6B00; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .icon { font-size:60px; margin-bottom:16px; display:none; }
  .msg { font-size:20px; font-weight:800; margin-bottom:8px; }
  .sub { color:#666; font-size:14px; line-height:1.7; }
  .btn { display:inline-block; margin-top:28px; background:#FF6B00; color:white; padding:13px 30px; border-radius:12px; text-decoration:none; font-weight:700; font-size:15px; }
  .ad-preview { background:#1f1f1f; border-radius:14px; padding:16px; margin:20px 0; text-align:right; display:none; }
  .ad-preview img { width:100%; border-radius:10px; margin-bottom:12px; max-height:200px; object-fit:cover; }
  .ad-name { font-size:17px; font-weight:800; margin-bottom:6px; }
  .ad-info { color:#888; font-size:13px; line-height:1.8; }
  .actions { display:flex; gap:12px; margin-top:20px; }
  .approve-btn { flex:1; background:#00C853; color:white; border:none; padding:14px; border-radius:12px; font-family:Tajawal,sans-serif; font-size:16px; font-weight:800; cursor:pointer; transition:.2s; }
  .approve-btn:hover { background:#00a844; }
  .reject-btn { flex:1; background:#e74c3c; color:white; border:none; padding:14px; border-radius:12px; font-family:Tajawal,sans-serif; font-size:16px; font-weight:800; cursor:pointer; transition:.2s; }
  .reject-btn:hover { background:#c0392b; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">N-PULSE</div>
  <div class="subtitle">لوحة مراجعة الإعلانات</div>
  <div class="spinner" id="spinner"></div>
  <div class="icon" id="icon"></div>
  <div class="msg" id="msg">جاري تحميل الإعلان...</div>
  <div class="sub" id="sub"></div>

  <!-- معاينة الإعلان -->
  <div class="ad-preview" id="adPreview">
    <img id="adImg" src="" alt="">
    <div class="ad-name" id="adName"></div>
    <div class="ad-info" id="adInfo"></div>
    <div class="actions">
      <button class="approve-btn" onclick="doAction('approve')">✅ نشر في القناة</button>
      <button class="reject-btn" onclick="doAction('reject')">❌ رفض</button>
    </div>
  </div>

  <a href="/" class="btn" id="homeBtn" style="display:none">🏠 العودة للموقع</a>
</div>

<script>
var TG_TOKEN   = "8719573206:AAF5PzZBm9IVId32LaYzPLd3lgIPHxylRgI";
var ADMIN_ID   = "5707206170";
var CHANNEL_ID = "@N-pulse-store";

var params     = new URLSearchParams(window.location.search);
var msgId      = params.get('mid');   // message_id في محادثة الأدمن
var chatId     = params.get('cid');   // chat_id

var currentAd  = null;

function showResult(icon, msg, sub) {
  document.getElementById('spinner').style.display    = 'none';
  document.getElementById('adPreview').style.display  = 'none';
  document.getElementById('icon').style.display       = 'block';
  document.getElementById('icon').textContent         = icon;
  document.getElementById('msg').textContent          = msg;
  document.getElementById('sub').textContent          = sub;
  document.getElementById('homeBtn').style.display    = 'inline-block';
}

async function tgApi(method, body) {
  var res = await fetch("https://api.telegram.org/bot" + TG_TOKEN + "/" + method, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

function parseCaption(text) {
  var get = function(key) {
    var match = text.match(new RegExp(key + ': (.+)'));
    return match ? match[1].trim() : '';
  };
  return {
    name:      get('المنتج'),
    category:  get('القسم'),
    desc:      get('الوصف'),
    price:     get('السعر'),
    condition: get('الحالة'),
    country:   get('البلد').replace(/[\u{1F1E6}-\u{1F1FF}]/gu, '').trim(),
    whatsapp:  get('واتساب')
  };
}

async function loadAd() {
  if (!msgId || !chatId) {
    showResult('⚠️', 'رابط غير صحيح', 'افتح الرابط من تيليجرام مباشرة');
    return;
  }

  try {
    // جلب معلومات الرسالة
    var res = await tgApi('getUpdates', { limit: 100 });
    if (!res.ok) throw new Error('فشل الاتصال');

    // البحث عن الرسالة بالـ ID
    var found = null;
    for (var update of res.result) {
      var msg = update.message || update.channel_post;
      if (msg && String(msg.message_id) === String(msgId)) {
        found = msg;
        break;
      }
    }

    if (!found || !found.photo) {
      showResult('⚠️', 'الإعلان غير موجود', 'ربما انتهت صلاحية الرابط');
      return;
    }

    var ad = parseCaption(found.caption || '');
    var fileId = found.photo[found.photo.length - 1].file_id;

    // جلب رابط الصورة
    var fileRes = await tgApi('getFile', { file_id: fileId });
    var imgUrl = fileRes.ok
      ? "https://api.telegram.org/file/bot" + TG_TOKEN + "/" + fileRes.result.file_path
      : '';

    currentAd = { ad, fileId, imgUrl, caption: found.caption };

    // عرض المعاينة
    document.getElementById('spinner').style.display   = 'none';
    document.getElementById('msg').textContent         = 'مراجعة الإعلان';
    document.getElementById('sub').textContent         = 'اختر الإجراء المناسب';
    document.getElementById('adPreview').style.display = 'block';
    if (imgUrl) document.getElementById('adImg').src   = imgUrl;
    document.getElementById('adName').textContent      = ad.name;
    document.getElementById('adInfo').innerHTML        =
      'القسم: ' + ad.category + '<br>' +
      'السعر: ' + ad.price + '<br>' +
      'البلد: ' + ad.country + '<br>' +
      'الحالة: ' + ad.condition + '<br>' +
      'واتساب: ' + ad.whatsapp;

  } catch(e) {
    showResult('💥', 'حدث خطأ', e.message);
  }
}

async function doAction(action) {
  document.querySelector('.approve-btn').disabled = true;
  document.querySelector('.reject-btn').disabled  = true;

  if (action === 'approve') {
    try {
      // نشر الإعلان في القناة بنفس الصورة والكابشن
      var fd = new FormData();
      // نرسل الصورة بالـ file_id مباشرة بدون إعادة رفع
      var body = {
        chat_id: CHANNEL_ID,
        photo:   currentAd.fileId,
        caption: currentAd.caption
      };
      var res = await tgApi('sendPhoto', body);

      if (!res.ok) throw new Error(res.description);

      // إشعار للأدمن
      await tgApi('sendMessage', {
        chat_id: ADMIN_ID,
        text: '✅ تم نشر الإعلان في القناة بنجاح!\nالمنتج: ' + currentAd.ad.name
      });

      showResult('✅', 'تم النشر في القناة!', '"' + currentAd.ad.name + '" ظاهر الآن لجميع متابعي القناة والموقع');

    } catch(e) {
      showResult('💥', 'فشل النشر', e.message);
    }

  } else {
    await tgApi('sendMessage', {
      chat_id: ADMIN_ID,
      text: '❌ تم رفض الإعلان\nالمنتج: ' + (currentAd ? currentAd.ad.name : '')
    });
    showResult('❌', 'تم رفض الإعلان', 'لن يُنشر على الموقع');
  }
}

loadAd();
</script>
</body>
</html>
