<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-PULSE | مراجعة الإعلان</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Tajawal',sans-serif; background:#0D0D0D; color:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:#161616; border:1px solid rgba(255,107,0,0.25); border-radius:24px; padding:40px 30px; max-width:460px; width:100%; text-align:center; }
  .logo { font-size:28px; font-weight:900; color:#FF6B00; margin-bottom:4px; }
  .subtitle { color:#555; font-size:13px; margin-bottom:30px; }
  .spinner { width:48px; height:48px; border:3px solid rgba(255,107,0,0.15); border-top-color:#FF6B00; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .icon { font-size:60px; margin-bottom:14px; display:none; }
  .msg { font-size:20px; font-weight:800; margin-bottom:8px; }
  .sub { color:#666; font-size:14px; line-height:1.7; }
  .home-btn { display:inline-block; margin-top:24px; background:#FF6B00; color:white; padding:12px 28px; border-radius:12px; text-decoration:none; font-weight:700; font-size:15px; }
  .preview { background:#1f1f1f; border-radius:14px; padding:18px; margin:20px 0; text-align:right; display:none; }
  .preview img { width:100%; border-radius:10px; margin-bottom:14px; max-height:220px; object-fit:cover; }
  .ad-name { font-size:18px; font-weight:800; margin-bottom:8px; color:white; }
  .ad-info { color:#888; font-size:13px; line-height:2; }
  .ad-info span { color:#ccc; }
  .actions { display:flex; gap:12px; margin-top:18px; }
  .approve-btn { flex:1; background:#00C853; color:white; border:none; padding:14px; border-radius:12px; font-family:Tajawal,sans-serif; font-size:16px; font-weight:800; cursor:pointer; }
  .approve-btn:hover { background:#00a844; }
  .approve-btn:disabled { background:#333; cursor:not-allowed; }
  .reject-btn { flex:1; background:#e74c3c; color:white; border:none; padding:14px; border-radius:12px; font-family:Tajawal,sans-serif; font-size:16px; font-weight:800; cursor:pointer; }
  .reject-btn:hover { background:#c0392b; }
  .reject-btn:disabled { background:#333; cursor:not-allowed; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">N-PULSE</div>
  <div class="subtitle">لوحة مراجعة الإعلانات</div>
  <div class="spinner" id="spinner"></div>
  <div class="icon" id="icon"></div>
  <div class="msg" id="msg">جاري تحميل الإعلان...</div>
  <div class="sub" id="sub"></div>

  <div class="preview" id="preview">
    <img id="adImg" src="" alt="" onerror="this.style.display='none'">
    <div class="ad-name" id="adName"></div>
    <div class="ad-info" id="adInfo"></div>
    <div class="actions">
      <button class="approve-btn" id="approveBtn" onclick="doApprove()">✅ نشر في القناة</button>
      <button class="reject-btn"  id="rejectBtn"  onclick="doReject()">❌ رفض</button>
    </div>
  </div>

  <a href="/" class="home-btn" id="homeBtn" style="display:none">🏠 العودة للموقع</a>
</div>

<script>
var TG_TOKEN   = "8719573206:AAF5PzZBm9IVId32LaYzPLd3lgIPHxylRgI";
var ADMIN_ID   = "5707206170";
var CHANNEL_ID = "-1003725283538";
var ad = null;

var params = new URLSearchParams(window.location.search);
var action = params.get('action');
var raw    = params.get('d');

function showResult(icon, msg, sub) {
  document.getElementById('spinner').style.display  = 'none';
  document.getElementById('preview').style.display  = 'none';
  document.getElementById('icon').style.display     = 'block';
  document.getElementById('icon').textContent       = icon;
  document.getElementById('msg').textContent        = msg;
  document.getElementById('sub').textContent        = sub || '';
  document.getElementById('homeBtn').style.display  = 'inline-block';
}

async function tgSend(method, body) {
  var res = await fetch("https://api.telegram.org/bot" + TG_TOKEN + "/" + method, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function doApprove() {
  document.getElementById('approveBtn').disabled = true;
  document.getElementById('rejectBtn').disabled  = true;
  document.getElementById('approveBtn').textContent = '⏳ جاري النشر...';

  try {
    var flagMap = {'الإمارات':'🇦🇪','السعودية':'🇸🇦','الأردن':'🇯🇴'};
    var currMap = {'الإمارات':'AED','السعودية':'SAR','الأردن':'JOD'};
    var caption =
"✅ N-PULSE-AD\n" +
"المنتج: " + ad.name + "\n" +
"القسم: " + ad.category + "\n" +
"الوصف: " + ad.desc + "\n" +
"السعر: " + ad.price + " " + (currMap[ad.country]||'') + "\n" +
"الحالة: " + ad.condition + "\n" +
"البلد: " + (flagMap[ad.country]||'') + " " + ad.country + "\n" +
"واتساب: https://wa.me/" + ad.whatsapp;

    // نشر في القناة باستخدام file_id الصورة
    var res = await tgSend('sendPhoto', {
      chat_id: CHANNEL_ID,
      photo:   ad.fileId,
      caption: caption
    });

    if (!res.ok) throw new Error(res.description);

    // إشعار للأدمن
    await tgSend('sendMessage', {
      chat_id: ADMIN_ID,
      text: '✅ تم نشر إعلان "' + ad.name + '" في القناة بنجاح!'
    });

    showResult('✅', 'تم النشر في القناة!', '"' + ad.name + '" ظاهر الآن لجميع الزوار 🎉');
  } catch(e) {
    showResult('💥', 'فشل النشر', e.message);
  }
}

async function doReject() {
  document.getElementById('approveBtn').disabled = true;
  document.getElementById('rejectBtn').disabled  = true;

  await tgSend('sendMessage', {
    chat_id: ADMIN_ID,
    text: '❌ تم رفض إعلان "' + (ad ? ad.name : '') + '"'
  });
  showResult('❌', 'تم رفض الإعلان', 'لن يُنشر على الموقع');
}

async function loadFromUrl() {
  if (!raw) { showResult('⚠️', 'رابط غير صحيح', 'افتح الرابط من تيليجرام'); return; }

  try {
    ad = JSON.parse(decodeURIComponent(raw));

    // جلب رابط الصورة من تيليجرام
    var fileRes = await fetch("https://api.telegram.org/bot" + TG_TOKEN + "/getFile?file_id=" + ad.fileId);
    var fileData = await fileRes.json();
    if (fileData.ok) {
      var imgUrl = "https://api.telegram.org/file/bot" + TG_TOKEN + "/" + fileData.result.file_path;
      document.getElementById('adImg').src = imgUrl;
    }

    var flagMap = {'الإمارات':'🇦🇪','السعودية':'🇸🇦','الأردن':'🇯🇴'};
    var currMap = {'الإمارات':'AED','السعودية':'SAR','الأردن':'JOD'};
    document.getElementById('adName').textContent = ad.name;
    document.getElementById('adInfo').innerHTML =
      'القسم: <span>' + ad.category + '</span><br>' +
      'السعر: <span>' + ad.price + ' ' + (currMap[ad.country]||'') + '</span><br>' +
      'البلد: <span>' + (flagMap[ad.country]||'') + ' ' + ad.country + '</span><br>' +
      'الحالة: <span>' + ad.condition + '</span><br>' +
      'الوصف: <span>' + ad.desc + '</span><br>' +
      'واتساب: <span>+' + ad.whatsapp + '</span>';

    document.getElementById('spinner').style.display  = 'none';
    document.getElementById('msg').textContent        = 'مراجعة الإعلان';
    document.getElementById('sub').textContent        = 'اختر الإجراء المناسب';
    document.getElementById('preview').style.display  = 'block';

    // لو الأكشن موجود في الرابط مباشرة (زر الرفض)
    if (action === 'reject') doReject();

  } catch(e) {
    showResult('💥', 'خطأ في قراءة البيانات', e.message);
  }
}

loadFromUrl();
</script>
</body>
</html>
