<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-PULSE | إضافة إعلان</title>
    <style>
        :root { --primary: #0088cc; --dark: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h2 { text-align: center; color: var(--dark); margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 17px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #0077b5; transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* تنسيقات أداة الترجمة */
        .custom-translate-container { position: absolute; top: 20px; right: 20px; display: inline-block; }
        .lang-button { background-color: #333; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .lang-dropdown { display: none; position: absolute; background-color: #fff; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 10; border-radius: 5px; right: 0; }
        .lang-dropdown a { color: black; padding: 10px 15px; text-decoration: none; display: block; text-align: right; font-size: 14px; }
        .lang-dropdown a:hover { background-color: #f1f1f1; }
        .show { display: block; }
        #google_translate_element, .skiptranslate.goog-te-gadget { display: none !important; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
    </style>
</head>
<body>

    <div class="custom-translate-container">
        <button onclick="toggleDropdown()" class="lang-button">Language / اللغة</button>
        <div id="myDropdown" class="lang-dropdown">
            <a href="javascript:void(0)" onclick="translatePage('ar')">العربية</a>
            <a href="javascript:void(0)" onclick="translatePage('en')">English</a>
            <a href="javascript:void(0)" onclick="translatePage('zh-CN')">中文 (Chinese)</a>
            <a href="javascript:void(0)" onclick="translatePage('fr')">Français</a>
            <a href="javascript:void(0)" onclick="translatePage('de')">Deutsch</a>
            <a href="javascript:void(0)" onclick="translatePage('es')">Español</a>
        </div>
    </div>

    <div id="google_translate_element"></div>

    <div class="card">
        <h2>نشر إعلان جديد</h2>
        
        <label>اسم المنتج</label>
        <input type="text" id="p_name" placeholder="مثلاً: فيجر زورو" required>

        <label>السعر (AED)</label>
        <input type="number" id="p_price" placeholder="10.00" required>

        <label>رقم الواتساب</label>
        <input type="tel" id="p_whatsapp" placeholder="971XXXXXXXXX" required>

        <label>البلد</label>
        <select id="p_country">
            <option value="الإمارات">الإمارات</option>
            <option value="الأردن">الأردن</option>
            <option value="السعودية">السعودية</option>
        </select>

        <label>حالة المنتج / نوع الإعلان</label>
        <select id="p_status">
            <option value="جديد">جديد</option>
            <option value="مستعمل">مستعمل</option>
            <option value="خدمة">خدمة</option>
        </select>

        <label>صورة المنتج</label>
        <input type="file" id="p_file" accept="image/*" required>

        <button onclick="sendOrder()" id="mainBtn" class="btn">إرسال الطلب</button>
    </div>

    <script>
        // دالة الترجمة
        function toggleDropdown() { document.getElementById("myDropdown").classList.toggle("show"); }
        function translatePage(langCode) {
            var select = document.querySelector('.goog-te-combo');
            if (select) { select.value = langCode; select.dispatchEvent(new Event('change')); }
            toggleDropdown(); 
        }
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ar',
                includedLanguages: 'en,zh-CN,fr,de,es,ar',
                autoDisplay: false
            }, 'google_translate_element');
        }

        // إرسال البيانات للتليجرام
        async function sendOrder() {
            const token = "8719573206:AAF5PzZBm9IVId32LaYzPLd3lgIPHxylRgI";
            const chatId = "5707206170"; 
            
            const name = document.getElementById('p_name').value;
            const price = document.getElementById('p_price').value;
            const whatsapp = document.getElementById('p_whatsapp').value;
            const country = document.getElementById('p_country').value;
            const status = document.getElementById('p_status').value;
            const fileInput = document.getElementById('p_file');
            const btn = document.getElementById('mainBtn');

            if(!name || !price || !whatsapp || !fileInput.files[0]) {
                alert("يرجى تعبئة جميع الخانات الأساسية واختيار صورة!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', fileInput.files[0]);
            
            const captionText = `🚀 *طلب إعلان جديد - N-PULSE*\n\n` +
                                `📦 *المنتج:* ${name}\n` +
                                `💰 *السعر:* ${price} AED\n` +
                                `🛠 *الحالة:* ${status}\n` +
                                `🌍 *البلد:* ${country}\n` +
                                `📱 *واتساب العميل:* https://wa.me/${whatsapp}\n\n` +
                                `⚠️ يرجى مراجعة الدفع قبل النشر.`;

            formData.append('caption', captionText);
            formData.append('parse_mode', 'Markdown');

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert("✅ تم الإرسال بنجاح!");
                    location.reload(); 
                } else {
                    const errorData = await response.json();
                    alert("❌ فشل الإرسال: " + errorData.description);
                    btn.disabled = false;
                    btn.innerText = "إرسال الطلب";
                }
            } catch (err) {
                alert("❌ مشكلة في الاتصال بالإنترنت.");
                btn.disabled = false;
                btn.innerText = "إرسال الطلب";
            }
        }

        window.onclick = function(event) {
            if (!event.target.matches('.lang-button')) {
                var dropdowns = document.getElementsByClassName("lang-dropdown");
                for (var i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
                }
            }
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
