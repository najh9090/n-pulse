<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-PULSE | نشر إعلان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B00;
    --orange-light: #FF8C35;
    --orange-glow: rgba(255,107,0,0.12);
    --dark: #0D0D0D;
    --dark-2: #161616;
    --dark-3: #1F1F1F;
    --dark-4: #252525;
    --green: #00C853;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--dark);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* خلفية */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(255,107,0,0.07), transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,107,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,0,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
  }

  /* الرجوع */
  .back-link {
    position: fixed;
    top: 20px;
    right: 24px;
    color: #666;
    text-decoration: none;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--dark-2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    transition: all 0.25s;
    z-index: 10;
  }
  .back-link:hover { border-color: var(--orange); color: var(--orange); }

  /* الكارد */
  .card {
    background: var(--dark-2);
    border: 1px solid rgba(255,107,0,0.15);
    border-radius: 28px;
    padding: 40px 36px;
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }

  /* الهيدر */
  .card-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .card-logo {
    font-size: 13px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: block;
  }

  .card-header h2 {
    font-size: 26px;
    font-weight: 900;
    margin-bottom: 8px;
  }

  .card-header p {
    font-size: 14px;
    color: #555;
  }

  .divider {
    width: 40px;
    height: 3px;
    background: var(--orange);
    border-radius: 2px;
    margin: 14px auto 0;
  }

  /* الحقول */
  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
    color: #888;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group label .licon { font-size: 14px; }

  .form-group input,
  .form-group select {
    width: 100%;
    background: var(--dark-3);
    border: 1.5px solid rgba(255,255,255,0.06);
    color: white;
    padding: 13px 16px;
    border-radius: 12px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    transition: all 0.25s;
    outline: none;
    appearance: none;
  }

  .form-group input::placeholder { color: #3a3a3a; }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--orange);
    background: var(--dark-4);
    box-shadow: 0 0 0 3px rgba(255,107,0,0.08);
  }

  .form-group select option { background: var(--dark-3); color: white; }

  /* حقل الملف */
  .file-upload {
    position: relative;
    cursor: pointer;
  }

  .file-upload input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    z-index: 2;
  }

  .file-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--dark-3);
    border: 1.5px dashed rgba(255,107,0,0.25);
    border-radius: 12px;
    padding: 20px;
    color: #555;
    font-size: 14px;
    transition: all 0.25s;
    text-align: center;
    flex-direction: column;
  }

  .file-label .file-icon { font-size: 28px; }

  .file-upload:hover .file-label,
  .file-upload input:focus ~ .file-label {
    border-color: var(--orange);
    color: var(--orange);
    background: var(--orange-glow);
  }

  .file-name {
    font-size: 12px;
    color: var(--green);
    margin-top: 6px;
    text-align: center;
    min-height: 16px;
  }

  /* صفان */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* زر الإرسال */
  .submit-btn {
    width: 100%;
    background: var(--orange);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.5px;
  }

  .submit-btn:hover:not(:disabled) {
    background: var(--orange-light);
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(255,107,0,0.3);
  }

  .submit-btn:disabled {
    background: #222;
    color: #444;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* تنبيه */
  .note {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: rgba(255,107,0,0.06);
    border: 1px solid rgba(255,107,0,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 16px;
    font-size: 12px;
    color: #666;
    line-height: 1.6;
  }

  .note span { flex-shrink: 0; font-size: 14px; }

  @media (max-width: 500px) {
    .card { padding: 28px 20px; border-radius: 20px; }
    .two-col { grid-template-columns: 1fr; gap: 0; }
    .back-link { top: 14px; right: 14px; font-size: 13px; padding: 6px 12px; }
  }

  /* === زر الترجمة === */
  .custom-translate-container { position: relative; display: inline-block; font-family: 'Tajawal', sans-serif; }
  .lang-button {
    background: rgba(255,107,0,0.1); color: #ccc; padding: 6px 14px;
    border: 1px solid rgba(255,107,0,0.3); border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all 0.2s; outline: none;
    font-family: 'Tajawal', sans-serif;
  }
  .lang-button:hover { background: rgba(255,107,0,0.2); border-color: #FF6B00; color: #FF6B00; }
  .lang-dropdown {
    display: none; position: absolute; background: #1F1F1F; min-width: 150px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 9999; border-radius: 10px;
    margin-top: 6px; right: 0; border: 1px solid rgba(255,107,0,0.2); overflow: hidden;
    animation: ldSlide 0.2s ease-out;
  }
  @keyframes ldSlide { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
  .lang-dropdown a {
    color: #aaa; padding: 10px 16px; text-decoration: none; display: block;
    text-align: right; font-size: 13px; transition: background 0.2s;
    border-bottom: 1px solid rgba(255,255,255,0.04); font-family: 'Tajawal', sans-serif;
  }
  .lang-dropdown a:last-child { border-bottom: none; }
  .lang-dropdown a:hover { background: rgba(255,107,0,0.1); color: #FF6B00; }
  .lang-dropdown.show { display: block !important; }
  #google_translate_element { position: absolute; top: -9999px; visibility: hidden; }
  .skiptranslate.goog-te-gadget, .goog-te-banner-frame, #goog-gt-tt, .goog-tooltip { display: none !important; }
  body { top: 0px !important; }
</style>
</head>
<body>

<a href="index.html" class="back-link">← الرئيسية</a>

<div class="card">
  <div class="card-header">
    <span class="card-logo">N-PULSE</span>
    <h2>📢 نشر إعلان جديد</h2>
    <p>أرسل تفاصيل منتجك وسيتم مراجعته ونشره</p>
    <div class="divider"></div>
  </div>

  <!-- اسم المنتج والسعر -->
  <div class="two-col">
    <div class="form-group">
      <label><span class="licon">📦</span> اسم المنتج</label>
      <input type="text" id="p_name" placeholder="مثلاً: آيفون 13">
    </div>
    <div class="form-group">
      <label><span class="licon">💰</span> السعر</label>
      <input type="number" id="p_price" placeholder="0.00">
    </div>
  </div>

  <!-- الواتساب -->
  <div class="form-group">
    <label><span class="licon">📱</span> رقم الواتساب</label>
    <input type="tel" id="p_whatsapp" placeholder="971XXXXXXXXX">
  </div>

  <!-- البلد والحالة -->
  <div class="two-col">
    <div class="form-group">
      <label><span class="licon">🌍</span> البلد</label>
      <select id="p_country">
        <option value="الإمارات">🇦🇪 الإمارات</option>
        <option value="السعودية">🇸🇦 السعودية</option>
        <option value="الأردن">🇯🇴 الأردن</option>
      </select>
    </div>
    <div class="form-group">
      <label><span class="licon">🏷️</span> الحالة</label>
      <select id="p_status">
        <option value="جديد">✨ جديد</option>
        <option value="مستعمل">🔄 مستعمل</option>
        <option value="خدمة">🔧 خدمة</option>
      </select>
    </div>
  </div>

  <!-- كود الاشتراك -->
  <div class="form-group">
    <label><span class="licon">🔑</span> كود الاشتراك</label>
    <input type="text" id="p_code" placeholder="أدخل الكود الخاص بك">
  </div>

  <!-- الصورة -->
  <div class="form-group">
    <label><span class="licon">🖼️</span> صورة المنتج</label>
    <div class="file-upload">
      <input type="file" id="p_file" accept="image/*" onchange="updateFileName(this)">
      <div class="file-label" id="fileLabel">
        <span class="file-icon">📷</span>
        <span>اضغط لاختيار صورة</span>
      </div>
    </div>
    <div class="file-name" id="fileName"></div>
  </div>

  <button class="submit-btn" id="mainBtn" onclick="sendOrder()">
    <span>إرسال الطلب</span> <span>🚀</span>
  </button>

  <div class="note">
    <span>⚠️</span>
    <span>سيتم مراجعة إعلانك والتحقق من الدفع قبل النشر. تأكد من صحة رقم الواتساب وكود الاشتراك.</span>
  </div>
</div>

<script>
function updateFileName(input) {
  const label = document.getElementById('fileLabel');
  const nameEl = document.getElementById('fileName');
  if (input.files && input.files[0]) {
    const name = input.files[0].name;
    nameEl.textContent = '✅ ' + name;
    label.innerHTML = '<span class="file-icon">✅</span><span>تم اختيار الصورة</span>';
    label.style.borderColor = 'var(--green)';
    label.style.color = 'var(--green)';
  }
}

async function sendOrder() {
  const token = "8719573206:AAF5PzZBm9IVId32LaYzPLd3lgIPHxylRgI";
  const chatId = "5707206170";

  const name = document.getElementById('p_name').value;
  const price = document.getElementById('p_price').value;
  const whatsapp = document.getElementById('p_whatsapp').value;
  const country = document.getElementById('p_country').value;
  const status = document.getElementById('p_status').value;
  const code = document.getElementById('p_code').value || "بدون كود";
  const fileInput = document.getElementById('p_file');
  const btn = document.getElementById('mainBtn');

  if (!name || !price || !whatsapp || !fileInput.files[0]) {
    alert("يرجى تعبئة جميع الخانات الأساسية واختيار صورة!");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span>⏳ جاري الإرسال...</span>';

  const formData = new FormData();
  formData.append('chat_id', chatId);
  formData.append('photo', fileInput.files[0]);

  const captionText =
    `🚀 *طلب إعلان جديد - N-PULSE*\n\n` +
    `📦 *المنتج:* ${name}\n` +
    `💰 *السعر:* ${price}\n` +
    `🛠 *الحالة:* ${status}\n` +
    `🌍 *البلد:* ${country}\n` +
    `🔑 *كود الاشتراك:* ${code}\n` +
    `📱 *واتساب العميل:* https://wa.me/${whatsapp}\n\n` +
    `⚠️ يرجى مراجعة الدفع قبل النشر.`;

  formData.append('caption', captionText);
  formData.append('parse_mode', 'Markdown');

  try {
    const response = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
      method: 'POST',
      body: formData
    });

    if (response.ok) {
      alert("✅ تم الإرسال بنجاح! سيتم مراجعة إعلانك قريباً.");
      location.reload();
    } else {
      const errorData = await response.json();
      alert("❌ فشل الإرسال: " + errorData.description);
      btn.disabled = false;
      btn.innerHTML = '<span>إرسال الطلب</span> <span>🚀</span>';
    }
  } catch (err) {
    alert("❌ مشكلة في الاتصال بالإنترنت.");
    btn.disabled = false;
    btn.innerHTML = '<span>إرسال الطلب</span> <span>🚀</span>';
  }
}
</script>


<div id="google_translate_element"></div>
<script>
  function toggleLangDropdown() {
    document.getElementById('langDropdown').classList.toggle('show');
  }
  function translatePage(langCode) {
    var select = document.querySelector('.goog-te-combo');
    if (select) {
      select.value = langCode;
      select.dispatchEvent(new Event('change', { bubbles: true }));
    }
    document.getElementById('langDropdown').classList.remove('show');
  }
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'ar',
      includedLanguages: 'en,zh-CN,fr,de,es,ar',
      autoDisplay: false
    }, 'google_translate_element');
  }
  window.addEventListener('click', function(event) {
    if (!event.target.matches('.lang-button')) {
      var d = document.getElementById('langDropdown');
      if (d && d.classList.contains('show')) d.classList.remove('show');
    }
  });
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
