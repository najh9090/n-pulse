<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-PULSE LIVE | البث المباشر</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .logo { position: absolute; top: 20px; right: 20px; font-weight: bold; font-size: 24px; color: #ff4757; z-index: 20; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        .overlay { position: absolute; bottom: 50px; z-index: 10; width: 100%; text-align: center; }
        .btn { border: none; padding: 15px 35px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        .btn-live { background: #ff4757; color: white; }
        .btn-play { background: #2ed573; color: white; display: none; } /* يظهر للمشاهد فقط */
        #status { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="logo">N-PULSE</div>
    <video id="video-player" autoplay playsinline></video>
    
    <div class="overlay">
        <div id="status">بانتظار الإشارة...</div><br>
        <button id="start-btn" class="btn btn-live" onclick="startBroadcasting()">ابدأ البث (بائع) 🔴</button>
        <button id="play-btn" class="btn btn-play" onclick="enableAudio()">اضغط لمشاهدة البث (مشتري) 🔊</button>
    </div>

<script>
    // إعداد Firebase بالرابط الخاص بك
    const firebaseConfig = { databaseURL: "https://npulse-live-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const peer = new Peer();
    const videoElement = document.getElementById('video-player');
    const statusText = document.getElementById('status');
    const playBtn = document.getElementById('play-btn');
    let localStream;

    // للمشاهد: تشغيل الصوت والفيديو يدوياً إذا منعه المتصفح
    function enableAudio() {
        videoElement.play();
        playBtn.style.display = 'none';
        statusText.innerText = "البث يعمل الآن ✅";
    }

    peer.on('open', (id) => {
        // مراقبة قاعدة البيانات
        database.ref('live_stream_id').on('value', (snapshot) => {
            const broadcasterId = snapshot.val();
            if (broadcasterId && broadcasterId !== id) {
                statusText.innerText = "هناك بث مباشر متاح!";
                playBtn.style.display = 'inline-block'; // اطلب من المستخدم الضغط للتشغيل
                connectToStream(broadcasterId);
            } else if (!broadcasterId) {
                statusText.innerText = "لا يوجد بث حالياً";
                videoElement.srcObject = null;
                playBtn.style.display = 'none';
            }
        });
    });

    // وظيفة البائع (إرسال البث)
    async function startBroadcasting() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            videoElement.srcObject = localStream;
            videoElement.muted = true; // صامت عند البائع فقط
            
            database.ref('live_stream_id').set(peer.id);
            database.ref('live_stream_id').onDisconnect().remove();

            document.getElementById('start-btn').style.display = 'none';
            statusText.innerText = "أنت الآن لايف! المشترون يشاهدونك.";
            
            peer.on('call', (call) => {
                call.answer(localStream);
            });
        } catch (err) {
            alert("تأكد من فتح الكاميرا واستخدام HTTPS");
        }
    }

    // وظيفة المشاهد (استقبال البث)
    function connectToStream(id) {
        const call = peer.call(id, null);
        call.on('stream', (stream) => {
            videoElement.srcObject = stream;
            videoElement.muted = false;
        });
    }
</script>
</body>
</html>
