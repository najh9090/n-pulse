<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-PULSE Live Stream & Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #007bff; --dark: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; width: 100%; max-width: 1200px; justify-content: center; }
        
        /* قسم الفيديو */
        .video-section { flex: 2; min-width: 300px; background: var(--card); padding: 15px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        video { width: 100%; border-radius: 10px; background: #000; box-shadow: inset 0 0 10px #333; }
        
        /* قسم الشات */
        .chat-section { flex: 1; min-width: 300px; background: var(--card); display: flex; flex-direction: column; height: 500px; border-radius: 15px; overflow: hidden; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #181818; }
        .msg { padding: 8px 12px; border-radius: 8px; font-size: 0.9em; max-width: 85%; }
        .msg.me { background: var(--primary); align-self: flex-end; color: white; }
        .msg.others { background: #333; align-self: flex-start; }
        
        .controls { padding: 15px; display: flex; gap: 5px; background: var(--card); }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #333; color: white; outline: none; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-stream { background: #d9534f; color: white; }
        .btn-watch { background: #5cb85c; color: white; }
        .btn-send { background: var(--primary); color: white; }
        
        .status-bar { width: 100%; text-align: center; padding: 10px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<h1 style="color: var(--primary); margin-top: 20px;">N-PULSE <span style="color: white;">LIVE</span></h1>

<div class="status-bar" id="status">جاري تشغيل النظام...</div>

<div class="container">
    <!-- الفيديو -->
    <div class="video-section">
        <video id="main-video" autoplay playsinline controls></video>
        <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn-stream" onclick="startBroadcasting()">ابدأ بث (كمذيع)</button>
            <input type="text" id="target-id" placeholder="أدخل ID المذيع للمشاهدة">
            <button class="btn-watch" onclick="joinStream()">مشاهدة البث</button>
        </div>
        <p style="font-size: 0.8em;">معرفك الحالي: <strong id="my-id" style="color: var(--primary);">...</strong></p>
    </div>

    <!-- الشات -->
    <div class="chat-section">
        <div id="chat-box">
            <div class="msg others">أهلاً بك في دردشة N-PULSE المباشرة!</div>
        </div>
        <div class="controls">
            <input type="text" id="chat-input" placeholder="اكتب رسالة...">
            <button class="btn-send" onclick="sendChatMessage()">إرسال</button>
        </div>
    </div>
</div>

<script>
    const peer = new Peer();
    let myStream;
    let connections = []; // لحفظ المتصلين بالشات
    const videoElem = document.getElementById('main-video');

    // 1. عند تشغيل الصفحة وجلب الـ ID
    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        document.getElementById('status').innerText = "جاهز للإرسال أو الاستقبال";
    });

    // --- وظائف البث (Video) ---

    function startBroadcasting() {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            myStream = stream;
            videoElem.srcObject = stream;
            videoElem.muted = true; // المذيع لا يسمع صوته لعدم حدوث صدى
            document.getElementById('status').innerText = "أنت الآن تبث مباشرة!";
            
            // استقبال المكالمات (المشاهدين)
            peer.on('call', call => {
                call.answer(myStream);
            });
        }).catch(err => alert("يرجى تفعيل الكاميرا: " + err));
    }

    function joinStream() {
        const broadcasterId = document.getElementById('target-id').value;
        if (!broadcasterId) return alert("أدخل ID المذيع أولاً");

        const call = peer.call(broadcasterId, null);
        document.getElementById('status').innerText = "جاري الاتصال بالمذيع...";

        call.on('stream', remoteStream => {
            videoElem.srcObject = remoteStream;
            videoElem.muted = false;
            document.getElementById('status').innerText = "أنت تشاهد البث الآن";
        });

        // ربط الشات تلقائياً عند المشاهدة
        const conn = peer.connect(broadcasterId);
        setupChatConnection(conn);
    }

    // --- وظائف الشات (Data) ---

    // المذيع يستقبل اتصالات الشات
    peer.on('connection', conn => {
        setupChatConnection(conn);
    });

    function setupChatConnection(conn) {
        connections.push(conn);
        conn.on('data', data => {
            appendMessage("طرف آخر", data, "others");
            // إعادة توجيه الرسالة للكل (Broadcast)
            connections.forEach(c => { if(c.open && c.peer !== conn.peer) c.send(data); });
        });
    }

    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const msg = input.value;
        if (!msg) return;

        connections.forEach(c => { if(c.open) c.send(msg); });
        appendMessage("أنت", msg, "me");
        input.value = "";
    }

    function appendMessage(sender, text, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<strong>${sender}:</strong> ${text}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
