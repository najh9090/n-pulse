<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-PULSE LIVE | البث المباشر</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main-color: #ff4757; --bg: #0f0f0f; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        .live-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; bottom: 40px; left: 20px; right: 20px; z-index: 10; pointer-events: none; }
        .controls { pointer-events: auto; display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
        .btn { padding: 12px 25px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-live { background: var(--main-color); color: white; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }
        .btn-live:hover { transform: scale(1.05); }
        #status-tag { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 12px; border: 1px solid var(--main-color); }
        .error-msg { color: #ff6b6b; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="live-container">
    <video id="remote-video" autoplay playsinline></video>
    
    <div class="overlay">
        <div class="controls">
            <div id="status-tag">جاري البحث عن بث...</div>
            <button class="btn btn-live" id="go-live-btn" onclick="startBroadcasting()">ابدأ بث مباشر (للبائع)</button>
            <div id="error-log" class="error-msg"></div>
            <h2 style="margin: 10px 0 5px 0;">N-PULSE Marketplace</h2>
            <p style="margin: 0; font-size: 14px; opacity: 0.8;">معاينة المنتجات مباشرة من الشارقة</p>
        </div>
    </div>
</div>

<script>
    // إنشاء كائن Peer بدون إعدادات معقدة (يستخدم سيرفر PeerJS المجاني تلقائياً)
    const peer = new Peer(); 
    const videoElem = document.getElementById('remote-video');
    const statusTag = document.getElementById('status-tag');
    const errorLog = document.getElementById('error-log');
    const goLiveBtn = document.getElementById('go-live-btn');

    let myStream = null;

    // 1. عند فتح الصفحة: توليد ID ومعالجة الأخطاء
    peer.on('open', (id) => {
        console.log('معرفك الخاص هو: ' + id);
        statusTag.innerText = "متصل بالشبكة. بانتظار بث مباشر...";
        
        // لمحاكاة "تيك توك": إذا كان هناك ID في الرابط، اتصل تلقائياً
        const urlParams = new URLSearchParams(window.location.search);
        const liveId = urlParams.get('live');
        if (liveId) {
            connectToStream(liveId);
        }
    });

    peer.on('error', (err) => {
        showError("حدث خطأ في الاتصال: " + err.type);
        console.error(err);
    });

    // 2. وظيفة البائع (المذيع)
    async function startBroadcasting() {
        try {
            // طلب الكاميرا والمايك
            myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            videoElem.srcObject = myStream;
            videoElem.muted = true; // المذيع لا يسمع صوته
            
            goLiveBtn.style.display = 'none';
            statusTag.innerText = "🔴 أنت الآن تبث مباشرة";
            statusTag.style.borderColor = "#2ecc71";

            // تحديث الرابط ليكون قابلاً للمشاركة فوراً
            const shareLink = window.location.origin + window.location.pathname + '?live=' + peer.id;
            console.log("رابط البث الخاص بك: " + shareLink);

            // استقبال المشاهدين
            peer.on('call', (call) => {
                call.answer(myStream);
            });

        } catch (err) {
            showError("لم نتمكن من الوصول للكاميرا. تأكد من إعطاء الصلاحية.");
            console.error(err);
        }
    }

    // 3. وظيفة المشاهد (الاتصال التلقائي)
    function connectToStream(remoteId) {
        statusTag.innerText = "جاري الاتصال بالبث...";
        const call = peer.call(remoteId, null);
        
        call.on('stream', (stream) => {
            videoElem.srcObject = stream;
            videoElem.muted = false;
            statusTag.innerText = "👁️ أنت تشاهد الآن";
            goLiveBtn.style.display = 'none';
        });

        call.on('error', (err) => {
            showError("فشل الاتصال بالبث.");
        });
    }

    function showError(msg) {
        errorLog.innerText = msg;
        errorLog.style.display = 'block';
        setTimeout(() => { errorLog.style.display = 'none'; }, 5000);
    }
</script>

</body>
</html>
