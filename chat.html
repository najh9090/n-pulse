<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-PULSE LIVE | البث المباشر</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .main-container { width: 100vw; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        .overlay { position: absolute; bottom: 40px; left: 20px; right: 20px; z-index: 10; text-align: center; }
        .btn-live { background: #ff4757; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); transition: 0.3s; }
        .btn-live:hover { transform: scale(1.05); background: #ff6b81; }
        #status-tag { background: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 20px; font-size: 14px; display: inline-block; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2); }
        .logo { position: absolute; top: 20px; right: 20px; font-weight: bold; font-size: 24px; color: #ff4757; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); z-index: 20; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo">N-PULSE</div>
    
    <video id="remote-video" autoplay playsinline></video>
    
    <div class="overlay">
        <div id="status-tag">بانتظار بدء البث...</div><br>
        <button id="start-live-btn" class="btn-live" onclick="startBroadcasting()">ابدأ البث الآن 🔴</button>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بمشروعك
    const firebaseConfig = {
        databaseURL: "https://npulse-live-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const peer = new Peer();
    const videoElement = document.getElementById('remote-video');
    const statusText = document.getElementById('status-tag');

    // مراقبة حالة البث (للمشاهدين)
    peer.on('open', (myPeerId) => {
        database.ref('live_stream_id').on('value', (snapshot) => {
            const broadcasterId = snapshot.val();
            
            if (broadcasterId && broadcasterId !== myPeerId) {
                statusText.innerText = "أنت تشاهد البث المباشر الآن ✅";
                statusText.style.color = "#2ed573";
                connectToStream(broadcasterId);
            } else if (!broadcasterId) {
                statusText.innerText = "لا يوجد بث مباشر حالياً.";
                statusText.style.color = "white";
                videoElement.srcObject = null;
            }
        });
    });

    // وظيفة بدء البث (للبائع)
    async function startBroadcasting() {
        try {
            const localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            videoElement.srcObject = localStream;
            videoElement.muted = true; // صامت عند البائع لمنع صدى الصوت
            
            // تسجيل معرف البث في السيرفر
            database.ref('live_stream_id').set(peer.id);
            
            // مسح المعرف عند إغلاق الصفحة تلقائياً
            database.ref('live_stream_id').onDisconnect().remove();

            document.getElementById('start-live-btn').style.display = 'none';
            statusText.innerText = "أنت الآن لايف! الجميع يشاهدك.";
            statusText.style.color = "#ff4757";

            // استقبال اتصالات المشاهدين الجدد
            peer.on('call', (call) => {
                call.answer(localStream);
            });
        } catch (err) {
            alert("يرجى تفعيل الكاميرا والميكروفون.");
            console.error(err);
        }
    }

    // وظيفة الاتصال بالبث (للمشاهد)
    function connectToStream(id) {
        const call = peer.call(id, null);
        call.on('stream', (incomingStream) => {
            videoElement.srcObject = incomingStream;
            videoElement.muted = false; // المشاهد يسمع الصوت
        });
    }
</script>

</body>
</html>
