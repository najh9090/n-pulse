<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-PULSE | انضم كـ موصل</title>
    <style>
        :root { --primary: #0088cc; --dark: #333; --success: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h2 { text-align: center; color: var(--dark); margin-bottom: 10px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn { background: var(--success); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 17px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #218838; transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* تنسيقات أداة الترجمة */
        .custom-translate-container { position: absolute; top: 20px; right: 20px; }
        .lang-button { background-color: #333; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .lang-dropdown { display: none; position: absolute; background-color: #fff; min-width: 140px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 10; border-radius: 5px; right: 0; }
        .lang-dropdown a { color: black; padding: 10px 15px; text-decoration: none; display: block; text-align: right; }
        .show { display: block; }
        #google_translate_element { display: none !important; }
    </style>
</head>
<body>

    <div class="custom-translate-container">
        <button onclick="toggleDropdown()" class="lang-button">Language / اللغة</button>
        <div id="myDropdown" class="lang-dropdown">
            <a href="javascript:void(0)" onclick="translatePage('ar')">العربية</a>
            <a href="javascript:void(0)" onclick="translatePage('en')">English</a>
            <a href="javascript:void(0)" onclick="translatePage('fr')">Français</a>
        </div>
    </div>

    <div id="google_translate_element"></div>

    <div class="card">
        <h2>طلب انضمام موصل</h2>
        <p class="subtitle">سجل بياناتك</p>
        
        <label>الاسم الكامل</label>
        <input type="text" id="d_name" placeholder="أدخل اسمك الثلاثي" required>

        <label>رقم الهاتف (واتساب)</label>
        <input type="tel" id="d_phone" placeholder="971XXXXXXXXX" required>

        <label>نوع المركبة</label>
        <select id="d_vehicle">
            <option value="دراجة نارية">دراجة نارية</option>
            <option value="سيارة">سيارة</option>
            <option value="سكوتر">سكوتر</option>
            <option value="أخرى">أخرى</option>
        </select>

        <label>منطقة العمل (المدينة)</label>
        <input type="text" id="d_area" placeholder="مثال: دبي، عمان، الرياض" required>

        <label>الصورة الشخصية</label>
        <input type="file" id="d_photo" accept="image/*" required>

        <button onclick="sendDeliveryRequest()" id="mainBtn" class="btn">تقديم الطلب الآن</button>
    </div>

    <script>
        function toggleDropdown() { document.getElementById("myDropdown").classList.toggle("show"); }
        function translatePage(langCode) {
            var select = document.querySelector('.goog-te-combo');
            if (select) { select.value = langCode; select.dispatchEvent(new Event('change')); }
            toggleDropdown(); 
        }
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar', includedLanguages: 'en,fr,ar', autoDisplay: false}, 'google_translate_element');
        }

        async function sendDeliveryRequest() {
            const token = "8719573206:AAF5PzZBm9IVId32LaYzPLd3lgIPHxylRgI";
            const chatId = "5707206170"; 
            
            const name = document.getElementById('d_name').value;
            const phone = document.getElementById('d_phone').value;
            const vehicle = document.getElementById('d_vehicle').value;
            const area = document.getElementById('d_area').value;
            const fileInput = document.getElementById('d_photo');
            const btn = document.getElementById('mainBtn');

            if(!name || !phone || !area || !fileInput.files[0]) {
                alert("يرجى إكمال جميع البيانات ورفع صورتك الشخصية!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "جاري إرسال طلبك...";

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', fileInput.files[0]);
            
            const captionText = `📇 *طلب انضمام مندوب جديد*\n\n` +
                                `👤 *الاسم:* ${name}\n` +
                                `📞 *الهاتف:* ${phone}\n` +
                                `🚗 *نوع المركبة:* ${vehicle}\n` +
                                `📍 *المنطقة:* ${area}\n` +
                                `📱 *رابط واتساب:* https://wa.me/${phone}\n\n` +
                                `📌 يرجى التواصل مع المتقدم لإجراء المقابلة.`;

            formData.append('caption', captionText);
            formData.append('parse_mode', 'Markdown');

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert("✅ تم إرسال طلبك بنجاح! سنتواصل معك قريباً.");
                    location.reload(); 
                } else {
                    alert("❌ فشل الإرسال، يرجى المحاولة لاحقاً.");
                    btn.disabled = false;
                    btn.innerText = "تقديم الطلب الآن";
                }
            } catch (err) {
                alert("❌ عذراً، يوجد مشكلة في الاتصال.");
                btn.disabled = false;
                btn.innerText = "تقديم الطلب الآن";
            }
        }

        window.onclick = function(event) {
            if (!event.target.matches('.lang-button')) {
                var dropdowns = document.getElementsByClassName("lang-dropdown");
                for (var i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
                }
            }
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
