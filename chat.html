<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>N-PULSE LIVE | بث مباشر تلقائي</title>
    <!-- مكتبة الاتصال ومكتبة قاعدة البيانات -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        video { width: 100%; height: 80vh; object-fit: cover; background: #111; }
        .controls { padding: 20px; }
        .btn { padding: 15px 30px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; background: #ff4757; color: white; }
    </style>
</head>
<body>

    <video id="live-video" autoplay playsinline></video>
    
    <div class="controls">
        <button id="start-btn" class="btn" onclick="goLive()">ابدأ بث مباشر الآن (للبائعين)</button>
        <p id="status">جاري البحث عن بث مباشر...</p>
    </div>

<script>
    // 1. إعداد Firebase (مجاني تماماً من جوجل)
    // ملاحظة: ستحتاج لإنشاء مشروع Firebase ووضع إعداداتك هنا
    const firebaseConfig = {
        databaseURL: "YOUR_FIREBASE_DATABASE_URL" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const peer = new Peer();
    const videoElem = document.getElementById('live-video');
    const statusElem = document.getElementById('status');

    // 2. المشتري: بمجرد فتح الصفحة، ابحث عن بائع "لايف"
    peer.on('open', (myId) => {
        db.ref('currentLive').on('value', (snapshot) => {
            const broadcasterId = snapshot.val();
            if (broadcasterId && broadcasterId !== myId) {
                connectToBroadcaster(broadcasterId);
            }
        });
    });

    // 3. البائع: عند الضغط على زر البث
    async function goLive() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        videoElem.srcObject = stream;
        videoElem.muted = true;
        
        // سجل الـ ID الخاص بك في Firebase ليراه كل زوار الموقع
        db.ref('currentLive').set(peer.id);
        
        statusElem.innerText = "أنت الآن تبث مباشرة لجميع زوار N-PULSE";
        
        peer.on('call', (call) => {
            call.answer(stream);
        });
    }

    // 4. وظيفة الربط التلقائي
    function connectToBroadcaster(remoteId) {
        statusElem.innerText = "تم العثور على بث مباشر! جاري الاتصال...";
        const call = peer.call(remoteId, null);
        call.on('stream', (remoteStream) => {
            videoElem.srcObject = remoteStream;
            videoElem.muted = false;
            statusElem.innerText = "أنت تشاهد البث الآن";
        });
    }
</script>
</body>
</html>
