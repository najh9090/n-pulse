<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-PULSE LIVE | البث المباشر</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <style>
        :root { --primary: #ff4757; --dark: #0a0a0a; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .main-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }

        .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 10; pointer-events: none; }
        .controls { pointer-events: auto; }
        
        .btn-live { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 20px rgba(255, 71, 87, 0.4); transition: 0.3s; }
        .btn-live:hover { transform: scale(1.05); background: #ff6b81; }

        #status-bar { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 12px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); }
        .live-tag { color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="status-bar">جاري البحث عن بث مباشر...</div>
        <video id="display-video" autoplay playsinline></video>

        <div class="overlay">
            <div class="controls">
                <span class="live-tag">🔴 N-PULSE LIVE</span>
                <h2 style="margin: 0 0 15px 0;">اكتشف المنتجات مباشرة</h2>
                <button class="btn-live" id="action-btn" onclick="goLiveNow()">ابدأ بث منتجك الآن</button>
            </div>
        </div>
    </div>

<script>
    // 1. إعداد Pusher ببياناتك الخاصة
    const pusher = new Pusher('ca8c11281ba306c108b9', {
        cluster: 'ap2',
        forceTLS: true
    });

    // القنوات الخاصة (Private) مطلوبة لإرسال أحداث العميل، لكن للتبسيط سنستخدم قناة عامة
    // ملاحظة: تأكد من تفعيل Client Events في إعدادات Pusher
    const channel = pusher.subscribe('cache-npulse-live');

    const peer = new Peer();
    const videoElem = document.getElementById('display-video');
    const statusElem = document.getElementById('status-bar');
    const actionBtn = document.getElementById('action-btn');

    // 2. استقبال البث (للمشاهدين)
    channel.bind('client-new-stream', (data) => {
        if (data.peerId && data.peerId !== peer.id) {
            statusElem.innerText = "تم العثور على بث! جاري الاتصال...";
            connectToStream(data.peerId);
        }
    });

    // 3. بدء البث (للبائع)
    async function goLiveNow() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            videoElem.srcObject = stream;
            videoElem.muted = true;
            
            actionBtn.style.display = 'none';
            statusElem.innerText = "أنت الآن لايف! الجميع يمكنهم رؤيتك.";

            // إرسال الـ ID الخاص بك لكل المتصلين حالياً
            channel.trigger('client-new-stream', { peerId: peer.id });

            peer.on('call', (call) => {
                call.answer(stream);
            });

        } catch (err) {
            alert("يرجى تفعيل الكاميرا والميكروفون واستخدام رابط HTTPS");
            console.error(err);
        }
    }

    // 4. وظيفة الاتصال التلقائي
    function connectToStream(remoteId) {
        const call = peer.call(remoteId, null);
        call.on('stream', (remoteStream) => {
            videoElem.srcObject = remoteStream;
            videoElem.muted = false;
            statusElem.innerText = "أنت تشاهد بثاً مباشراً الآن";
            actionBtn.style.display = 'none';
        });
    }

    // لتوليد ID فور فتح الصفحة
    peer.on('open', (id) => {
        console.log("معرفك جاهز: " + id);
    });
</script>

</body>
</html>
