<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>N-PULSE LIVE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        video { width: 100%; height: 85vh; object-fit: cover; background: #111; }
        .btn-live { position: fixed; bottom: 20px; right: 20px; padding: 15px 30px; background: #ff4757; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <div id="msg" style="padding: 10px; font-size: 14px;">جاري البحث عن بث مباشر...</div>
    <video id="v" autoplay playsinline></video>
    <button class="btn-live" onclick="startLive()">Go LIVE 🔴</button>

<script>
    // بيانات Pusher الخاصة بك
    const pusher = new Pusher('ca8c11281ba306c108b9', { cluster: 'ap2' });
    const channel = pusher.subscribe('npulse-channel'); // قناة عامة لسهولة الربط

    const peer = new Peer();
    const video = document.getElementById('v');
    const msg = document.getElementById('msg');

    // 1. المشتري (كل الناس): ينتظر رسالة "بدء البث"
    channel.bind('new-live', (data) => {
        if (data.id !== peer.id) {
            msg.innerText = "تم العثور على بث! جاري الاتصال...";
            const call = peer.call(data.id, null);
            call.on('stream', s => { video.srcObject = s; video.muted = false; });
        }
    });

    // 2. البائع: عند ضغط الزر
    async function startLive() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            video.srcObject = s;
            video.muted = true;

            // إرسال الـ ID الخاص بك لكل الناس (يجب تفعيل Client Events في Pusher)
            // ملاحظة: لو واجهت مشكلة في trigger، استخدم Firebase أو رابط مباشر
            channel.trigger('client-new-live', { id: peer.id }); 
            
            msg.innerText = "أنت الآن لايف عند الجميع!";
            peer.on('call', c => c.answer(s));
        } catch (e) {
            alert("تأكد من الـ HTTPS وصلاحية الكاميرا");
        }
    }
</script>
</body>
</html>
