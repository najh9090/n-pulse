<script>
// وظيفة معاينة الصور بدون تغيير أي id
function previewImages(input) {
    const preview = document.getElementById('img-preview');
    preview.innerHTML = '';
    if (input.files) {
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const div = document.createElement('div');
                div.innerHTML = `<img src="${e.target.result}" style="width:80px;height:80px;border-radius:10px;object-fit:cover;border:1px solid var(--orange);">`;
                preview.appendChild(div);
            }
            reader.readAsDataURL(file);
        });
    }
}

// وظيفة الإرسال البرمجية
async function sendOrder() {
    const token = "719573206:AAF5PzZBm9IVId32LaYzPLd3lgIPHxylRgI";
    const chatId = "5707206170";
    const btn = document.getElementById('mainBtn');

    // سحب البيانات من الـ IDs التي حددتها أنت
    const name = document.getElementById('p_name').value;
    const price = document.getElementById('p_price').value;
    const whatsapp = document.getElementById('p_whatsapp').value;
    const country = document.getElementById('p_country').value;
    const status = document.getElementById('p_status').value;
    const desc = document.getElementById('p_desc').value;
    const fileInput = document.getElementById('p_file');

    if (!name || !price || !whatsapp) {
        alert("تأكد من ملء الاسم والسعر والواتساب");
        return;
    }

    btn.innerText = "جاري النشر... ⏳";
    btn.disabled = true;

    // تنسيق الرسالة لتصل باسم نزار متجر
    const caption = `🏪 *نشر منتج جديد - نزار متجر*\n\n` +
                    `📦 *المنتج:* ${name}\n` +
                    `💰 *السعر:* ${price}\n` +
                    `🌍 *البلد:* ${country}\n` +
                    `✨ *الحالة:* ${status}\n` +
                    `📱 *واتساب:* https://wa.me/${whatsapp}\n` +
                    `📝 *الوصف:* ${desc}`;

    const formData = new FormData();
    formData.append('chat_id', chatId);
    formData.append('caption', caption);
    formData.append('parse_mode', 'Markdown');

    let url = `https://api.telegram.org/bot${token}/sendMessage`;

    // التعامل مع الصور إذا تم اختيارها
    if (fileInput.files && fileInput.files[0]) {
        url = `https://api.telegram.org/bot${token}/sendPhoto`;
        formData.append('photo', fileInput.files[0]);
    } else {
        formData.append('text', caption);
    }

    try {
        const response = await fetch(url, { method: 'POST', body: formData });
        if (response.ok) {
            alert("تم الإرسال بنجاح باسم نزار متجر ✅");
            // تنظيف الحقول مع الحفاظ على الهيكل
            document.querySelectorAll('#add input, #add textarea').forEach(el => el.value = '');
            document.getElementById('img-preview').innerHTML = '';
        } else {
            alert("خطأ! تأكد من تشغيل البوت وأرسل له /start");
        }
    } catch (err) {
        alert("فشل الاتصال، تحقق من الشبكة");
    } finally {
        btn.innerText = "إرسال الطلب 🚀";
        btn.disabled = false;
    }
}
</script>
</html>
