<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشر منتج - نزار متجر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff6b00;
            --dark-bg: #121212;
            --dark-card: #1e1e1e;
            --dark-input: #2a2a2a;
            --text-white: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .publish-section {
            width: 100%;
            max-width: 500px;
            background: var(--dark-card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { text-align: center; color: var(--orange); margin-bottom: 5px; }
        p { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #ddd; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: var(--dark-input);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--orange); }

        #dropzone {
            border: 2px dashed rgba(255,107,0,0.3);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: var(--dark-input);
            transition: 0.3s;
        }

        #dropzone:hover { border-color: var(--orange); background: rgba(255,107,0,0.05); }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,107,0,0.3); }
        .submit-btn:disabled { background: #555; cursor: not-allowed; }

        #img-preview img {
            width: 70px; height: 70px; border-radius: 8px; object-fit: cover; margin-top: 10px;
        }
    </style>
</head>
<body>

<section class="publish-section" id="add">
    <h2>انشر إعلانك الآن 📢</h2>
    <p>سيتم النشر فوراً في متجر نزار</p>

    <div class="publish-form-card">
        <div class="form-group">
            <label>اسم المنتج</label>
            <input type="text" id="p_name" placeholder="مثلاً: هاتف سامسونج S23">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>السعر (درهم)</label>
                <input type="number" id="p_price" placeholder="100">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>البلد</label>
                <select id="p_country">
                    <option value="الإمارات">🇦🇪 الإمارات</option>
                    <option value="السعودية">🇸🇦 السعودية</option>
                    <option value="الأردن">🇯🇴 الأردن</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>رقم الواتساب</label>
            <input type="tel" id="p_whatsapp" placeholder="971501220185">
        </div>

        <div class="form-group">
            <label>حالة المنتج</label>
            <select id="p_status">
                <option value="جديد">✨ جديد</option>
                <option value="مستعمل">🔄 مستعمل</option>
                <option value="خدمة">🔧 خدمة</option>
            </select>
        </div>

        <div class="form-group">
            <label>وصف المنتج</label>
            <textarea id="p_desc" placeholder="اكتب وصفاً مفصلاً..." rows="3"></textarea>
        </div>

        <div class="form-group">
            <label>صور المنتج</label>
            <div id="dropzone" onclick="document.getElementById('p_file').click()">
                <div style="font-size:30px;">📷</div>
                <div style="color:#888; font-size:13px;">اضغط لاختيار صورة واحدة للمعاينة</div>
            </div>
            <input type="file" id="p_file" accept="image/*" style="display:none" onchange="previewImage(this)">
            <div id="img-preview"></div>
        </div>

        <button class="submit-btn" id="mainBtn" onclick="sendOrder()">إرسال الطلب 🚀</button>
    </div>
</section>

<script>
    function previewImage(input) {
        const preview = document.getElementById('img-preview');
        preview.innerHTML = '';
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                preview.appendChild(img);
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function sendOrder() {
        const token = "719573206:AAF5PzZBm9IVId32LaYzPLd3lgIPHxylRgI";
        const chatId = "5707206170";
        const btn = document.getElementById('mainBtn');

        const name = document.getElementById('p_name').value;
        const price = document.getElementById('p_price').value;
        const whatsapp = document.getElementById('p_whatsapp').value;
        const country = document.getElementById('p_country').value;
        const status = document.getElementById('p_status').value;
        const desc = document.getElementById('p_desc').value;
        const fileInput = document.getElementById('p_file');

        if (!name || !price || !whatsapp) {
            alert("يرجى ملء الاسم، السعر، والواتساب");
            return;
        }

        btn.innerText = "جاري النشر... ⏳";
        btn.disabled = true;

        const caption = `🏪 *نشر منتج جديد - متجر نزار*\n\n` +
                        `📦 *المنتج:* ${name}\n` +
                        `💰 *السعر:* ${price} درهم\n` +
                        `🇦🇪 *البلد:* ${country}\n` +
                        `✨ *الحالة:* ${status}\n` +
                        `📱 *واتساب:* https://wa.me/${whatsapp}\n` +
                        `📝 *الوصف:* ${desc}`;

        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('caption', caption);
        formData.append('parse_mode', 'Markdown');

        let url = `https://api.telegram.org/bot${token}/sendMessage`;

        // إذا اختار صورة، نغير الرابط ونضيف الصورة
        if (fileInput.files && fileInput.files[0]) {
            url = `https://api.telegram.org/bot${token}/sendPhoto`;
            formData.append('photo', fileInput.files[0]);
        } else {
            formData.append('text', caption);
        }

        try {
            const response = await fetch(url, { method: 'POST', body: formData });
            if (response.ok) {
                alert("تم النشر بنجاح في متجر نزار ✅");
                location.reload(); // إعادة تحميل الصفحة لتنظيف الخانات
            } else {
                alert("خطأ في الإرسال، تأكد من تشغيل البوت");
            }
        } catch (error) {
            alert("حدث خطأ في الاتصال");
        } finally {
            btn.innerText = "إرسال الطلب 🚀";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
