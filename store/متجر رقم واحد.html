<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم - متجر مود الشرطة SQ5</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--dark:#0a0c10;--panel:#111318;--border:#1e2330;
  --text:#e8eaf0;--muted:#6b7280;--green:#4ade80;--red:#f87171;--blue:#60a5fa;
}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}

/* ── LOGIN SCREEN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--panel);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:36px 32px;width:100%;max-width:380px;text-align:center}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-card input{width:100%;background:#1a1f2e;border:1.5px solid rgba(255,255,255,0.07);color:#fff;padding:13px 16px;border-radius:12px;font-family:'Cairo',sans-serif;font-size:15px;outline:none;transition:.2s;margin-bottom:12px}
.login-card input:focus{border-color:var(--gold)}
.login-card input::placeholder{color:#444}
.login-btn{width:100%;background:var(--gold);color:#000;border:none;padding:14px;border-radius:12px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:.2s}
.login-btn:hover{background:#d4aa55}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* ── DASHBOARD ── */
.dash{display:none}
.topbar{background:linear-gradient(160deg,#0d1018,#141926);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:44px;height:44px;background:var(--panel);border:2px solid var(--gold);border-radius:10px;overflow:hidden}
.topbar-logo img{width:100%;height:100%;object-fit:cover}
.topbar-title{font-size:16px;font-weight:900;color:#fff}
.topbar-sub{font-size:11px;color:var(--gold)}
.logout-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);padding:8px 16px;border-radius:50px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;transition:.2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ── TABS ── */
.dash-tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border)}
.dtab{padding:14px 24px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;font-family:'Cairo',sans-serif}
.dtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.dtab:hover:not(.active){color:var(--text)}

/* ── CONTENT ── */
.dash-content{padding:24px;max-width:960px;margin:0 auto}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.stat-label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stat-val{font-size:26px;font-weight:900;color:#fff}
.stat-val.gold{color:var(--gold)}
.stat-val.green{color:var(--green)}
.stat-val.blue{color:var(--blue)}

/* ── SECTION TITLE ── */
.sec-title{font-size:13px;font-weight:800;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── ADD PRODUCT FORM ── */
.form-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:7px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:700;color:#999}
.form-group input,.form-group select,.form-group textarea{background:#1a1f2e;border:1.5px solid rgba(255,255,255,0.07);color:#fff;padding:11px 14px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:.2s;appearance:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-group input::placeholder,.form-group textarea::placeholder{color:#444}
.form-group select option{background:#1a1f2e}
.form-group textarea{resize:vertical;min-height:80px}
.add-btn{margin-top:18px;width:100%;background:var(--gold);color:#000;border:none;padding:14px;border-radius:12px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.add-btn:hover{background:#d4aa55;transform:translateY(-1px)}
.add-btn:disabled{background:#333;color:#666;cursor:not-allowed;transform:none}

/* ── ORDERS TABLE ── */
.orders-wrap{overflow-x:auto}
.orders-table{width:100%;border-collapse:collapse;font-size:13px}
.orders-table th{text-align:right;padding:10px 14px;color:var(--muted);font-weight:700;font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap}
.orders-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.orders-table tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge.new{background:#1a2e1a;color:var(--green);border:1px solid #2d5a2d}
.badge.pending{background:#2e2010;color:#fb923c;border:1px solid #5a3010}
.badge.done{background:#1a1f2e;color:var(--blue);border:1px solid #1e3a5f}
.empty-orders{text-align:center;padding:40px;color:var(--muted);font-size:13px}

/* ── TOAST ── */
.tst{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1f2e;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:600;z-index:9999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
.tst.show{transform:translateX(-50%) translateY(0)}
.tst.ok{border-color:var(--green);color:var(--green)}
.tst.err{border-color:var(--red);color:var(--red)}

@media(max-width:520px){
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <div class="login-title">لوحة التحكم</div>
    <div class="login-sub">متجر مود الشرطة SQ5</div>
    <input type="password" id="passInput" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div class="login-err" id="loginErr">❌ كلمة المرور غلط</div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div class="dash" id="dashboard">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <img src="https://i.postimg.cc/XYfvj8Yz/f46226c7-b53d-475a-b89f-ace8e1c61708.jpg" alt="logo">
      </div>
      <div>
        <div class="topbar-title">لوحة التحكم</div>
        <div class="topbar-sub">متجر مود الشرطة SQ5 · N-PULSE</div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">تسجيل خروج</button>
  </div>

  <div class="dash-tabs">
    <div class="dtab active" onclick="switchTab('products',this)">➕ إضافة منتج</div>
    <div class="dtab" onclick="switchTab('orders',this)">📦 الطلبات</div>
  </div>

  <div class="dash-content">

    <!-- TAB: ADD PRODUCT -->
    <div id="tab-products">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">📦 إجمالي المنتجات</div>
          <div class="stat-val blue" id="statProducts">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🛒 إجمالي الطلبات</div>
          <div class="stat-val green" id="statOrders">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">⏳ طلبات معلقة</div>
          <div class="stat-val gold" id="statPending">0</div>
        </div>
      </div>

      <div class="sec-title">➕ إضافة منتج جديد</div>
      <div class="form-card">
        <div class="form-grid">
          <div class="form-group">
            <label>اسم المنتج *</label>
            <input type="text" id="f_name" placeholder="مثال: حزمة الأفواج العسكرية">
          </div>
          <div class="form-group">
            <label>السعر *</label>
            <input type="text" id="f_price" placeholder="مثال: 50 ريال أو مجاني">
          </div>
          <div class="form-group">
            <label>التصنيف</label>
            <select id="f_cat">
              <option value="عسكرية">🪖 عسكرية</option>
              <option value="مواطنين">🚗 مواطنين</option>
              <option value="أخرى">📦 أخرى</option>
            </select>
          </div>
          <div class="form-group">
            <label>الحالة</label>
            <select id="f_status">
              <option value="متاح">✅ متاح</option>
              <option value="قريباً">⏳ قريباً</option>
              <option value="نفد">❌ نفد</option>
            </select>
          </div>
          <div class="form-group full">
            <label>وصف المنتج</label>
            <textarea id="f_desc" placeholder="اكتب تفاصيل المنتج..."></textarea>
          </div>
          <div class="form-group full">
            <label>رابط صورة المنتج (اختياري)</label>
            <input type="text" id="f_img" placeholder="https://...">
          </div>
        </div>
        <button class="add-btn" id="addBtn" onclick="addProduct()">
          <span id="addBtnTxt">إرسال المنتج للبوت 🚀</span>
        </button>
      </div>
    </div>

    <!-- TAB: ORDERS -->
    <div id="tab-orders" style="display:none">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">🛒 إجمالي الطلبات</div>
          <div class="stat-val green" id="statOrders2">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">⏳ معلقة</div>
          <div class="stat-val gold" id="statPending2">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">✅ مكتملة</div>
          <div class="stat-val blue" id="statDone">0</div>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
        <div class="sec-title" style="margin:0">📦 سجل الطلبات</div>
        <button onclick="clearOrders()" style="background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);padding:7px 14px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer">🗑 مسح السجل</button>
      </div>

      <div class="orders-wrap">
        <table class="orders-table">
          <thead>
            <tr>
              <th>#</th>
              <th>المنتج</th>
              <th>الاسم</th>
              <th>واتساب</th>
              <th>الوقت</th>
              <th>الحالة</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="7" class="empty-orders">لا توجد طلبات بعد</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div class="tst" id="tst"></div>

<script>
const TG_TOKEN = "8719573206:AAF5PzZBm9IVId32LaYzPLd3lgIPHxylRgI";
const TG_CHAT  = "5707206170";
const PASS     = "sq5admin"; // ← كلمة المرور - غيرها حسب رغبتك

// ── LOGIN ──
function doLogin() {
  const v = document.getElementById('passInput').value;
  if (v === PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
    renderOrders();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('passInput').value = '';
  document.getElementById('loginErr').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

// ── TABS ──
function switchTab(name, el) {
  ['products','orders'].forEach(t => document.getElementById('tab-'+t).style.display = 'none');
  document.querySelectorAll('.dtab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).style.display = 'block';
  el.classList.add('active');
  if (name === 'orders') renderOrders();
}

// ── TOAST ──
function toast(msg, type) {
  const t = document.getElementById('tst');
  t.textContent = msg;
  t.className = 'tst ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── STORAGE ──
function getOrders() { try { return JSON.parse(localStorage.getItem('sq5_orders') || '[]'); } catch(e) { return []; } }
function saveOrders(o) { localStorage.setItem('sq5_orders', JSON.stringify(o)); }
function getProductCount() { return parseInt(localStorage.getItem('sq5_prodcount') || '0'); }
function incProductCount() { localStorage.setItem('sq5_prodcount', getProductCount() + 1); }

// ── STATS ──
function loadStats() {
  const orders = getOrders();
  const pending = orders.filter(o => o.status === 'معلقة').length;
  const done    = orders.filter(o => o.status === 'مكتملة').length;
  document.getElementById('statProducts').textContent = getProductCount();
  document.getElementById('statOrders').textContent   = orders.length;
  document.getElementById('statPending').textContent  = pending;
  document.getElementById('statOrders2').textContent  = orders.length;
  document.getElementById('statPending2').textContent = pending;
  document.getElementById('statDone').textContent     = done;
}

// ── ADD PRODUCT ──
async function addProduct() {
  const name   = document.getElementById('f_name').value.trim();
  const price  = document.getElementById('f_price').value.trim();
  const cat    = document.getElementById('f_cat').value;
  const status = document.getElementById('f_status').value;
  const desc   = document.getElementById('f_desc').value.trim() || 'بدون وصف';
  const img    = document.getElementById('f_img').value.trim();
  const btn    = document.getElementById('addBtn');
  const txt    = document.getElementById('addBtnTxt');

  if (!name || !price) { toast('⚠️ يرجى تعبئة الاسم والسعر', 'err'); return; }

  btn.disabled = true;
  txt.textContent = 'جاري الإرسال...';

  const msg =
    `🆕 *منتج جديد - متجر مود الشرطة SQ5*\n\n` +
    `📦 *الاسم:* ${name}\n` +
    `💰 *السعر:* ${price}\n` +
    `📂 *التصنيف:* ${cat}\n` +
    `🏷 *الحالة:* ${status}\n` +
    `📝 *الوصف:* ${desc}\n` +
    (img ? `🖼 *صورة:* ${img}\n` : '') +
    `\n🏪 N-PULSE | متجر مود الشرطة SQ5`;

  try {
    const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TG_CHAT, text: msg, parse_mode: 'Markdown' })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.description);

    incProductCount();
    loadStats();
    toast('✅ تم إرسال المنتج للبوت بنجاح!', 'ok');
    document.getElementById('f_name').value  = '';
    document.getElementById('f_price').value = '';
    document.getElementById('f_desc').value  = '';
    document.getElementById('f_img').value   = '';
  } catch(e) {
    toast('❌ فشل الإرسال: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    txt.textContent = 'إرسال المنتج للبوت 🚀';
  }
}

// ── RENDER ORDERS ──
function renderOrders() {
  loadStats();
  const orders = getOrders();
  const tbody = document.getElementById('ordersBody');
  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-orders">لا توجد طلبات بعد 📭</td></tr>';
    return;
  }
  tbody.innerHTML = [...orders].reverse().map((o, i) => `
    <tr>
      <td style="color:var(--muted)">${orders.length - i}</td>
      <td style="color:#fff;font-weight:700">${o.product}</td>
      <td>${o.name}</td>
      <td><a href="https://wa.me/${o.wa}" target="_blank" style="color:var(--green);text-decoration:none">${o.wa}</a></td>
      <td style="color:var(--muted);font-size:12px">${o.time}</td>
      <td>
        <select onchange="changeStatus(${orders.length-1-i},this.value)"
          style="background:#1a1f2e;border:1px solid rgba(255,255,255,0.07);color:#fff;padding:4px 8px;border-radius:6px;font-family:'Cairo',sans-serif;font-size:11px;outline:none;cursor:pointer">
          <option ${o.status==='معلقة'?'selected':''} value="معلقة">⏳ معلقة</option>
          <option ${o.status==='مكتملة'?'selected':''} value="مكتملة">✅ مكتملة</option>
          <option ${o.status==='ملغي'?'selected':''} value="ملغي">❌ ملغي</option>
        </select>
      </td>
      <td>
        <button onclick="deleteOrder(${orders.length-1-i})"
          style="background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Cairo',sans-serif">
          حذف
        </button>
      </td>
    </tr>
  `).join('');
}

function changeStatus(idx, val) {
  const orders = getOrders();
  orders[idx].status = val;
  saveOrders(orders);
  loadStats();
}

function deleteOrder(idx) {
  const orders = getOrders();
  orders.splice(idx, 1);
  saveOrders(orders);
  renderOrders();
}

function clearOrders() {
  if (!confirm('هل أنت متأكد من مسح كل الطلبات؟')) return;
  saveOrders([]);
  renderOrders();
}

// ── RECEIVE ORDERS FROM STORE PAGE ──
// الطلبات الواصلة من صفحة المتجر تُحفظ في localStorage تلقائياً
window.addEventListener('storage', e => {
  if (e.key === 'sq5_orders') renderOrders();
});
</script>
</body>
</html>
